name: Docker Image Create

on:
  push:
  pull_request:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
      tag: ${{ steps.image.outputs.tag }}
      image: ${{ steps.image.outputs.image }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Determine branch
      id: branch
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BRANCH="${{ github.base_ref }}"
        else
          BRANCH="${{ github.ref_name }}"
        fi
        echo "Branch: $BRANCH"
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT

    - name: Set image
      id: image
      run: |
        BRANCH="${{ steps.branch.outputs.branch }}"
        TAG=$([ "$BRANCH" = "master" ] && echo "latest" || echo "$BRANCH")
        IMAGE="ghcr.io/eusorov/${{ github.event.repository.name }}:${TAG}"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "image=$IMAGE" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.image.outputs.image }}
        build-args: |
          GIT_BRANCH=${{ steps.branch.outputs.branch }}
          GIT_COMMIT=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build
    uses: ./.github/workflows/docker-deploy-vps.yml
    with:
      IMAGE: ${{ needs.build.outputs.image }}
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }} 
