name: Deploy Docker

on:
  workflow_call:
    inputs:
      IMAGE:
        required: true
        type: string
        description: Full Docker image reference (e.g. ghcr.io/eusorov/image:latest)
    secrets:
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      DOCKER_TOKEN:
        required: true
      OPENAI_API_KEY:
        required: true

  workflow_dispatch:
    inputs:
      IMAGE:
        required: true
        type: string
        description: Full Docker image reference (e.g. ghcr.io/eusorov/image:latest)

env:
  REMOTE_DIR: ${{ github.event.repository.name }}
  CONTAINER_NAME: ${{ github.event.repository.name }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose*.yml"
          target: ${{ env.REMOTE_DIR }}
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ env.REMOTE_DIR }}
            export LLM_PROVIDER="openai"
            export IMAGE="${{ inputs.IMAGE }}"
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ secrets.DOCKER_TOKEN }}
            docker image prune -a
            docker pull ${{ inputs.IMAGE }}
            
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml down || true
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d
      