services:
  app:
    build:
      context: .
    expose:
      - "7860"
    environment:
      - VIRTUAL_HOST=rag.usomi.de,raglangchain.local
      - VIRTUAL_PORT=7860
      - LETSENCRYPT_HOST=rag.usomi.de
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT= ${GRADIO_SERVER_PORT:-7860}
      # LLM_PROVIDER: ollama | gemini | openai (switch implementation)
      - LLM_PROVIDER=openai
      # Ollama (when LLM_PROVIDER=ollama)
      - LOCAL_LLM_BASE=${LOCAL_LLM_BASE:-http://host.docker.internal:11434}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-qwen3}
      - LOCAL_EMBEDDING_MODEL=${LOCAL_EMBEDDING_MODEL:-qwen3-embedding}
      # Gemini (when LLM_PROVIDER=gemini)
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-lite}
      # OpenAI (when LLM_PROVIDER=openai)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_SSL=false
      - GRADIO_COLLECTION_NAME=gradio_current_pdf
      # Authentication — bcrypt hashes contain '$' which Docker Compose variable
      # interpolation corrupts. Pass users.json via a Docker secret (file-based)
      # so Python reads it directly without any interpolation.
      - AUTH_USERS_FILE=users.json
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-lgtm:4318
      - OTEL_SERVICE_NAME=raglangchain
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m gradio_app
    networks:
      - nginx_proxy_net
      - raglangchain_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  chromadb:
    image: chromadb/chroma:1.5.3
    volumes:
      - ./chroma-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - raglangchain_net
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "4318:4318"
      - "4317:4317"
      - "3000:3000"
    environment:
      - LGTMC_PROJECT_ID=raglangchain
      - LGTMC_DATASET_ID=raglangchain
      - LGTMC_SERVICE_NAME=raglangchain
      - LGTMC_SERVICE_VERSION=1.0.0
      - LGTMC_SERVICE_INSTANCE=raglangchain
      - LGTMC_SERVICE_ENVIRONMENT=development
      - LGTMC_SERVICE_HOST=raglangchain
    networks:
      - raglangchain_net
volumes:
  chroma-data:

networks:
  raglangchain_net:
    driver: bridge
  nginx_proxy_net:
    external: true