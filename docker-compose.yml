services:
  app:
    build:
      context: .
    ports:
      - "7860:7860"
    environment:
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
      # LLM_PROVIDER: ollama | gemini | openai (switch implementation)
      LLM_PROVIDER: "${LLM_PROVIDER:-ollama}"
      # Ollama (when LLM_PROVIDER=ollama)
      LOCAL_LLM_BASE: "${LOCAL_LLM_BASE:-http://host.docker.internal:11434}"
      LOCAL_LLM_MODEL: "${LOCAL_LLM_MODEL:-qwen3}"
      LOCAL_EMBEDDING_MODEL: "${LOCAL_EMBEDDING_MODEL:-qwen3-embedding}"
      # Gemini (when LLM_PROVIDER=gemini)
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash-lite}"
      # OpenAI (when LLM_PROVIDER=openai)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
      CHROMA_SSL: "false"
      GRADIO_COLLECTION_NAME: "gradio_current_pdf"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m gradio_app
  chromadb:
    image: chromadb/chroma:1.5.3
    volumes:
      - ./chroma-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma-data:
